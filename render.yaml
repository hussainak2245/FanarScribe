services:
  - type: web
    name: fanar-scribe-api
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: FANAR_API_KEY
        sync: false
      - key: FANAR_BASE_URL
        value: https://api.fanar.qa/v1
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_ASR_MODEL
        value: whisper-large-v3
      - key: GROQ_LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: STORE_AUDIO
        value: false
